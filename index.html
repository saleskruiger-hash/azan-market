<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azan Market</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#111827;
color:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:32px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
}

.hero{
background:linear-gradient(90deg,#2563eb,#0ea5e9);
color:white;
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

.search-box{
max-width:700px;
margin:auto;
display:flex;
}

.search-box input{
flex:1;
padding:18px;
font-size:18px;
border:none;
}

.search-box button{
padding:18px 35px;
background:#111827;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<header>

<div class="logo">AZAN MARKET</div>

<nav>
<a href="#">Home</a>
<a href="#">Websites</a>
<a href="#">Categories</a>
<a href="#">Contact</a>
</nav>

</header>

<section class="hero">

<h1>Global Guest Post Marketplace</h1>

<p>Buy High Authority Guest Posts From Trusted Publishers</p>

<div class="search-box">
<input type="text" placeholder="Search Websites...">
<button>Search</button>
</div>

</section>

</body>
</html>
