<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azan Market</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f7fb;
}

header{
background:#111827;
color:white;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:32px;
font-weight:bold;
}

nav a{
color:white;
text-decoration:none;
margin-left:25px;
font-weight:bold;
}

.hero{
background:linear-gradient(90deg,#2563eb,#0ea5e9);
color:white;
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:55px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
margin-bottom:30px;
}

.search-box{
max-width:700px;
margin:auto;
display:flex;
}

.search-box input{
flex:1;
padding:18px;
font-size:18px;
border:none;
}

.search-box button{
padding:18px 35px;
background:#111827;
color:white;
border:none;
cursor:pointer;
}
.featured{
padding:60px 8%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:#fff;
padding:25px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,.1);
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

.card h3{
margin-bottom:15px;
color:#111827;
}

.price{
font-size:28px;
font-weight:bold;
color:#2563eb;
margin:15px 0;
}

.buy{
display:inline-block;
background:#2563eb;
color:white;
padding:12px 24px;
border-radius:8px;
text-decoration:none;
}
